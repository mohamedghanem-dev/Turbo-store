name: Build Nexus Arab Store APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Pillow
        run: pip install Pillow --quiet

      - name: Install web app dependencies
        run: npm ci

      - name: Build web app (Vite)
        run: npm run build

      - name: Init Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npx cap init "Nexus Arab Store" "dev.mohamedghanem.nexusarab" --web-dir dist

      - name: Add Android
        run: npx cap add android

      - name: Sync Capacitor (copy web assets into Android project)
        run: npx cap sync android

      - name: Setup icon
        run: python3 resize_icon.py

      - name: Generate assets
        run: npx capacitor-assets generate --android

      - name: Sync again (apply generated icons/splash)
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: Nexus-Arab-Store-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
